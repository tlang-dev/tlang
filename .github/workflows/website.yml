name: Website

on:
  push:
    branches:
      - main
    paths:
      - "website/**"
      - "src/**"
      - ".github/workflows/website.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate:
    name: Generate & Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Build tlang
        uses: actions-rs/cargo@v1
        with:
          command: build
          args: --release

      - name: Create output directories
        run: mkdir -p website/docs/assets website/docs/docs

      - name: Generate website
        run: ./target/release/tlang compile-run website/Main.tlang

      - name: Add .nojekyll
        run: touch website/docs/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/docs

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
